<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pathway SVG Template — smiles-to-3d
  Copy this template and replace BASE64_PLACEHOLDER with actual base64 data.
  Adjust viewBox, x/y coordinates for your specific pathway topology.
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1100 430" width="1100" height="430">

  <defs>
    <!-- Style 11: solid chevron marker (#2c2c2c) -->
    <marker id="arrow-solid" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <polyline points="0,1.5 6,4.5 0,7.5" fill="none"
                stroke="#2c2c2c" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Style D5: dashed chevron marker (#aaaaaa) -->
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <polyline points="0,1.5 6,4.5 0,7.5" fill="none"
                stroke="#aaaaaa" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Layer 2: Molecules (150×150 main, 130×130 side) -->
  <g id="molecules">
    <!-- Main chain node 1 -->
    <image x="80" y="10" width="150" height="150"
           xlink:href="data:image/png;base64,<!-- BASE64_NODE1 -->"/>
    <!-- Main chain node 2 -->
    <image x="440" y="10" width="150" height="150"
           xlink:href="data:image/png;base64,<!-- BASE64_NODE2 -->"/>
    <!-- Main chain node 3 -->
    <image x="800" y="10" width="150" height="150"
           xlink:href="data:image/png;base64,<!-- BASE64_NODE3 -->"/>
    <!-- Side fragment 1 (130×130) -->
    <image x="515" y="185" width="130" height="130"
           xlink:href="data:image/png;base64,<!-- BASE64_SIDE1 -->"/>
    <!-- Side fragment 2 (130×130) -->
    <image x="875" y="185" width="130" height="130"
           xlink:href="data:image/png;base64,<!-- BASE64_SIDE2 -->"/>
  </g>

  <!-- Layer 3: Arrows -->
  <g id="arrows" fill="none">
    <!-- Solid arrow 1: node1 → node2 -->
    <line x1="255" y1="85" x2="415" y2="85"
          stroke="#2c2c2c" stroke-width="1.6"
          marker-end="url(#arrow-solid)"/>
    <!-- Solid arrow 2: node2 → node3 -->
    <line x1="615" y1="85" x2="775" y2="85"
          stroke="#2c2c2c" stroke-width="1.6"
          marker-end="url(#arrow-solid)"/>
    <!-- Dashed S-curve 1: side fragment from node1 -->
    <path d="M 230,110 C 320,110 360,160 450,200 S 500,240 580,250"
          stroke="#aaaaaa" stroke-width="1.6"
          stroke-dasharray="6,4"
          marker-end="url(#arrow-dashed)"/>
    <!-- Dashed S-curve 2: side fragment from node2 -->
    <path d="M 590,110 C 680,110 720,160 810,200 S 860,240 940,250"
          stroke="#aaaaaa" stroke-width="1.6"
          stroke-dasharray="6,4"
          marker-end="url(#arrow-dashed)"/>
  </g>

  <!-- Layer 4: Labels (Times New Roman, editable text) -->
  <g id="labels" font-family="Times New Roman, serif" font-size="16"
     fill="#1a1a1a" text-anchor="middle">
    <text x="155" y="8" font-style="italic"><!-- LABEL_NODE1 --></text>
    <text x="515" y="8" font-style="italic"><!-- LABEL_NODE2 --></text>
    <text x="875" y="8" font-style="italic"><!-- LABEL_NODE3 --></text>
    <text x="580" y="180" font-size="14" font-style="italic"><!-- LABEL_SIDE1 --></text>
    <text x="940" y="180" font-size="14" font-style="italic"><!-- LABEL_SIDE2 --></text>
  </g>

  <!-- Layer 5: Reaction annotations -->
  <g id="annotations" font-family="Times New Roman, serif" font-size="13"
     fill="#555555" text-anchor="middle" font-style="italic">
    <text x="335" y="75"><!-- ANNO_ARROW1 --></text>
    <text x="695" y="75"><!-- ANNO_ARROW2 --></text>
  </g>

</svg>
